# ============================================
# Nginx Configuration for Books SND Sync API
# ============================================
# 
# Instalação:
# 1. Copiar este arquivo para: C:\nginx\conf\nginx.conf
# 2. Ajustar server_name para seu domínio
# 3. Configurar certificados SSL
# 4. Testar: nginx -t
# 5. Recarregar: nginx -s reload

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log  logs/access.log  main;
    error_log   logs/error.log   warn;
    
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    
    # Gzip compression
    gzip  on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Rate limiting (proteção contra DDoS)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    # Upstream para sync-api
    upstream sync_api {
        server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ============================================
    # Servidor HTTP (porta 80)
    # Redireciona todo tráfego para HTTPS
    # ============================================
    server {
        listen       80;
        listen       [::]:80;
        server_name  sync-api.seudominio.com.br;  # ← ALTERAR para seu domínio
        
        # Redirecionar para HTTPS
        return 301 https://$server_name$request_uri;
    }

    # ============================================
    # Servidor HTTPS (porta 443)
    # Proxy reverso para sync-api
    # ============================================
    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  sync-api.seudominio.com.br;  # ← ALTERAR para seu domínio

        # ========================================
        # Certificados SSL
        # ========================================
        # Opção 1: Let's Encrypt (win-acme)
        ssl_certificate      C:/nginx/ssl/certificate.crt;
        ssl_certificate_key  C:/nginx/ssl/private.key;
        
        # Opção 2: Certificado comercial
        # ssl_certificate      C:/nginx/ssl/seudominio.crt;
        # ssl_certificate_key  C:/nginx/ssl/seudominio.key;

        # ========================================
        # Configurações SSL/TLS
        # ========================================
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        
        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ========================================
        # Security Headers
        # ========================================
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # ========================================
        # CORS Headers
        # ========================================
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
        add_header 'Access-Control-Max-Age' '86400' always;

        # ========================================
        # Proxy para sync-api
        # ========================================
        location / {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            
            # Proxy pass
            proxy_pass http://sync_api;
            proxy_http_version 1.1;
            
            # Headers importantes
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Cache bypass
            proxy_cache_bypass $http_upgrade;
            
            # Não fazer proxy de erros
            proxy_intercept_errors off;
        }

        # ========================================
        # Health Check Endpoint
        # ========================================
        location /health {
            proxy_pass http://sync_api/health;
            access_log off;
            
            # Sem rate limiting para health checks
            limit_req off;
        }

        # ========================================
        # Endpoint de Status do Nginx
        # ========================================
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        # ========================================
        # Bloquear acesso a arquivos sensíveis
        # ========================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
